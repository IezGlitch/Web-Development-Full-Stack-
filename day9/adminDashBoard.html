<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 80px auto 80px; /*1st 80px last 80px and mid all are set to auto */
            gap: 10px;
            border: 2px solid ;
        }
        header{
            grid-column: 1/3;
            /* starts with 1 and end before 3 */
            background-color: blue;
            padding: 20px;
        }
        aside{

            background-color: grey;

        }
        main{
            background-color: brown;
        }
        footer{
            background-color: blueviolet;
            grid-column: 1/3;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        <aside>Side bar</aside>
        <main>
            Main Content
        </main>
        <footer>Footer</footer>
    </div>
</body>
</html>
