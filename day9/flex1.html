<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 1px solid black;
            height: 100px;
            width: 100px;
            background-color: brown;
        }
        .product{
            background-color: antiquewhite;
            display: flex;  /* By default row layout */
            /* flex-direction: row-reverse; */

            height: 200px;
            gap: 20px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="product">
        <div class="box">Cake</div>
        <div class="box">Cookies</div>
        <div class="box">Waffle</div>
    </div>
</body>
</html>
