<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            background-color: maroon;
            box-sizing: border-box;
            font-family: Arial;
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .cart{
            background-color: pink;
            border: 1px solid black;
            width: 230px;
            padding: 20px;
            margin-bottom: 7px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 2px 2px 8px black;
        }
        .cart:hover{
            background-color: cadetblue;
            transition: 2s;
            transform: scale(1.03);
            color: white;
            transform: rotateY(200deg);
        }
        .cart h2{
            border-bottom: 1px solid black;
        }
        .cart img{
            width: 230px;
            height: 230px;
            object-fit: cover;
            border-radius: 10px;
        }
        .cart button{
            background-color: yellow;
            border: none;
            border-radius: 12px;
            width: 90%;
        
        }
        
    </style>
</head>
<body>
    <div class="cart">
    <img src="https://images.pexels.com/photos/8356854/pexels-photo-8356854.jpeg">
    <h2>Headphone</h2>
    <p>Rs 2,299</p>
    <button>Buy Now</button>
    </div>

    <div class="cart">
    <img src="https://images.pexels.com/photos/18573073/pexels-photo-18573073.jpeg">
    <h2>Earphones</h2>
    <p>Rs 1,199</p>
    <button>Buy Now</button>
    </div>

    <div class="cart">
    <img src="https://images.pexels.com/photos/32300575/pexels-photo-32300575.jpeg">
    <h2>Speaker</h2>
    <p>Rs 3,499</p>
    <button>Buy Now</button>
    </div>

    <div class="cart">
    <img src="https://images.pexels.com/photos/4988137/pexels-photo-4988137.jpeg" alt="Monitor">
    <h2>Monitor</h2>
    <p>Rs 10,999</p>
    <button>Buy Now</button>
    </div>

</body>
</html>
