<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Piano Events</h2>
    <div class="piano">
        <div class="key"data-note="C">C</div>
        <div class="key" data-note="D">D</div>
        <div class="key"data-note="E">E</div>
        <div class="key" data-note="F">F</div>
        <div class="key"data-note="G">G</div>
        <div class="key"data-note="A">A</div>
        <div class="key"data-note="B">B</div>
    </div>


    <audio> id="audio"</audio>

    <script>
        const keys = document.getElementByClassName(".key")
        console.log(keys)
        keys.forEach( function(e){

            const note = e.getAttribute("data-note")
            const audio = document.getElementById("audio-"+note)

            e.addEventListner('click',function(){
                audio.currentTime = 0;
                audio.play()
            })

            e.addEventListener('mouseover',function(){
                e.style.backgroundColor = "lightblue"
            })
            e.addEventListener('mouseout',function(){
                e.style.backgroundColor ="white"
            })
        })
    </script>
</body>
</html>
